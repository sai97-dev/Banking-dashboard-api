name: Banking Dashboard API - CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: banking_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies (all services)
        run: npm run install:all

      - name: Run ESLint
        run: npm run lint

      - name: Run unit tests - Account Service
        working-directory: ./services/account-service
        env:
          POSTGRES_URI: postgresql://test_user:test_pass@localhost:5432/banking_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test_secret
        run: npm test -- --coverage --watchAll=false

      - name: Run unit tests - Payment Service
        working-directory: ./services/payment-service
        env:
          POSTGRES_URI: postgresql://test_user:test_pass@localhost:5432/banking_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test_secret
        run: npm test -- --coverage --watchAll=false

      - name: Run unit tests - Frontend
        working-directory: ./client
        run: npm test -- --coverage --watchAll=false

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'banking-dashboard-api'
          path: '.'
          format: 'HTML'

      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [lint-and-test, security-scan]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Account Service
        run: |
          docker build -t $ECR_REGISTRY/account-service:${{ github.sha }} ./services/account-service
          docker push $ECR_REGISTRY/account-service:${{ github.sha }}
          docker tag $ECR_REGISTRY/account-service:${{ github.sha }} $ECR_REGISTRY/account-service:latest
          docker push $ECR_REGISTRY/account-service:latest

      - name: Build and push Payment Service
        run: |
          docker build -t $ECR_REGISTRY/payment-service:${{ github.sha }} ./services/payment-service
          docker push $ECR_REGISTRY/payment-service:${{ github.sha }}

      - name: Build and push Frontend
        run: |
          docker build -t $ECR_REGISTRY/banking-client:${{ github.sha }} ./client
          docker push $ECR_REGISTRY/banking-client:${{ github.sha }}

  deploy:
    name: Deploy to AWS ECS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy Account Service to ECS
        run: |
          aws ecs update-service \
            --cluster banking-cluster \
            --service account-service \
            --force-new-deployment

      - name: Deploy Payment Service to ECS
        run: |
          aws ecs update-service \
            --cluster banking-cluster \
            --service payment-service \
            --force-new-deployment

      - name: Wait for deployment to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster banking-cluster \
            --services account-service payment-service

      - name: Notify deployment success
        run: echo "Deployment to production completed successfully at $(date)"
